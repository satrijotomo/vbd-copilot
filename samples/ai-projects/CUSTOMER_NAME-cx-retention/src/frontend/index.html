<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="CUSTOMER_NAME - Assistente virtuale per la spiegazione delle bollette energetiche">
  <meta name="theme-color" content="#0066CC">
  <title>CUSTOMER_NAME - Assistente Bollette</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div id="chat-app" class="chat-app" role="main">

    <!-- Header -->
    <header class="chat-header" role="banner">
      <div class="header-content">
        <div class="header-logo" aria-hidden="true">
          <svg viewBox="0 0 40 40" width="40" height="40" role="img" aria-label="Logo CUSTOMER_NAME">
            <circle cx="20" cy="20" r="18" fill="#00A651" opacity="0.15"/>
            <circle cx="20" cy="20" r="12" fill="#00A651" opacity="0.3"/>
            <circle cx="20" cy="20" r="6" fill="#00A651"/>
          </svg>
        </div>
        <div class="header-text">
          <h1 class="header-title">CUSTOMER_NAME</h1>
          <p class="header-subtitle">Assistente Bollette</p>
        </div>
      </div>
    </header>

    <!-- Messages Area -->
    <div id="chat-messages" class="chat-messages" role="log" aria-live="polite" aria-label="Conversazione">
      <!-- Messages are injected here by chat.js -->
    </div>

    <!-- Bill Reference Badge (shown when a bill_ref is active) -->
    <div id="bill-ref-badge" class="bill-ref-badge hidden" aria-live="polite">
      <span class="bill-ref-badge-label">Bolletta:</span>
      <span id="bill-ref-badge-value" class="bill-ref-badge-value"></span>
      <button id="bill-ref-remove"
              class="bill-ref-badge-remove"
              type="button"
              aria-label="Rimuovi riferimento bolletta"
              title="Rimuovi">&times;</button>
    </div>

    <!-- Input Area -->
    <div class="chat-input-area" role="form" aria-label="Invia messaggio">

      <!-- Bill Reference Toggle -->
      <div id="bill-ref-section" class="bill-ref-section hidden">
        <label for="bill-ref-input" class="bill-ref-label">Numero bolletta</label>
        <div class="bill-ref-row">
          <input id="bill-ref-input"
                 type="text"
                 class="bill-ref-input"
                 placeholder="Es. 2024-ENE-00123456"
                 aria-label="Inserisci il numero della bolletta"
                 autocomplete="off">
          <button id="bill-ref-confirm"
                  class="bill-ref-confirm"
                  type="button"
                  aria-label="Conferma numero bolletta">OK</button>
        </div>
      </div>

      <button id="bill-ref-toggle"
              class="bill-ref-toggle"
              type="button"
              aria-label="Inserisci numero bolletta"
              aria-expanded="false">Hai un numero di bolletta?</button>

      <!-- Main Input -->
      <div class="input-row">
        <input id="chat-input"
               type="text"
               class="chat-input"
               placeholder="Scrivi la tua domanda sulla bolletta..."
               aria-label="Scrivi il tuo messaggio"
               autocomplete="off"
               maxlength="2000">
        <button id="send-button"
                class="send-button"
                type="button"
                aria-label="Invia messaggio"
                title="Invia">
          <!-- Arrow icon (SVG) -->
          <svg viewBox="0 0 24 24" width="22" height="22" fill="none" stroke="currentColor"
               stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>

    <!-- Footer Disclaimer -->
    <footer class="chat-footer" role="contentinfo">
      <p class="footer-disclaimer">
        Questo assistente utilizza intelligenza artificiale. Le risposte potrebbero contenere imprecisioni.
      </p>
    </footer>

  </div>

  <script src="chat.js" defer></script>
</body>
</html>
